[pytest]
# ============================================
# Pytest配置文件
# ============================================

# 命令行默认参数
addopts =
    -v
    -s
    -p no:asyncio
    --browser chromium
    --alluredir=reports/allure-results
    --dist=loadscope

# 测试用例目录
testpaths = tests

# 测试文件匹配规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 自定义标记（需在此注册，否则warning）
markers =
    smoke: 冒烟测试标记 - 核心流程快速验证
    regression: 回归测试标记 - 全量功能验证
    login: 登录模块测试
    operation: 运营角色业务线
    sales: 销售角色业务线
    customer: 客户角色业务线
    positive: 正向测试用例
    negative: 反向测试用例
    flaky: 不稳定用例（需要重试验证）
    order: 测试用例执行顺序标记（pytest-order 插件）

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = reports/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s (%(filename)s:%(lineno)d): %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# 优化警告过滤
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
